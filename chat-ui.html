<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Bot Chat</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #fffdf9;
      --ink: #1e293b;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-2: #115e59;
      --user: #cffafe;
      --bot: #ecfeff;
      --border: #d6d3d1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #fde68a 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, #bae6fd 0%, transparent 35%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .chat-shell {
      width: min(920px, 100%);
      height: min(85vh, 740px);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(120deg, #ecfeff, #f0fdf4);
    }

    .chat-header h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.2px;
    }

    .chat-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .messages {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: fadeUp 180ms ease-out;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      border-bottom-left-radius: 4px;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: #fafaf9;
    }

    input {
      width: 100%;
      font-size: 1rem;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease;
    }

    button:hover { background: var(--accent-2); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .chat-shell { height: 92vh; border-radius: 14px; }
      .msg { max-width: 92%; }
      .composer { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="chat-shell">
    <header class="chat-header">
      <h1>Portfolio Assistant</h1>
      <p>Ask about projects, skills, experience, education, and contact details.</p>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <form id="chat-form" class="composer">
      <input id="message-input" type="text" placeholder="Type your question..." autocomplete="off" required />
      <button id="send-btn" type="submit">Send</button>
    </form>
  </main>

  <script>
    const WEBHOOK_URL = window.PORTFOLIO_RASA_ENDPOINT || window.RASA_BOT_ENDPOINT || "http://127.0.0.1:5005/webhooks/rest/webhook";
    const SENDER_ID = "portfolio-web-user";

    const messages = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");

    function appendMessage(text, role) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage(message) {
      const payload = { sender: SENDER_ID, message };
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        mode: "cors",
        cache: "no-store",
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error(`Request failed: ${response.status}`);
      }

      return response.json();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;

      try {
        const botMessages = await sendMessage(text);
        if (!Array.isArray(botMessages) || botMessages.length === 0) {
          appendMessage("No response from bot.", "bot");
        } else {
          for (const item of botMessages) {
            appendMessage(item.text || "(non-text response)", "bot");
          }
        }
      } catch (error) {
        appendMessage("Could not reach bot. Make sure Rasa is running on 127.0.0.1:5005 with CORS enabled.", "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    appendMessage("Hi! I am your portfolio assistant. Ask me anything about your portfolio.", "bot");
    input.focus();
  </script>
</body>
</html>
