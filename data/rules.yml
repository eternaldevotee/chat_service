version: "3.1"

rules:
  - rule: Respond to greeting
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Respond to projects question
    steps:
      - intent: ask_projects
      - action: utter_projects

  - rule: Respond to skills question
    steps:
      - intent: ask_skills
      - action: utter_skills

  - rule: Respond to experience question
    steps:
      - intent: ask_experience
      - action: utter_experience

  - rule: Respond to contact question
    steps:
      - intent: ask_contact
      - action: utter_contact

  - rule: Respond to explicit out of scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - rule: Respond to low confidence fallback
    steps:
      - intent: nlu_fallback
      - action: utter_out_of_scope
